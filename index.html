<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Fancy Tetris</title>
		<style>
			:root {
				--bg: #0b1020;
				--bg-grid: #1a2240;
				--bg-cell-empty: #0f172a;
				--fg: #e2e8f0;
				--fg-dim: #94a3b8;
				--accent: #38bdf8;
				--frame: #1e293b;
				--cell-px: 30px;
				--mini-cell-px: 18px;
			}

			* {
				box-sizing: border-box;
			}

			html,
			body {
				margin: 0;
				padding: 0;
				background: radial-gradient(
						ellipse at top,
						rgba(56, 189, 248, 0.08),
						transparent 60%
					),
					var(--bg);
				color: var(--fg);
				font-family: ui-sans-serif, system-ui, -apple-system, sans-serif;
				min-height: 100vh;
				-webkit-font-smoothing: antialiased;
			}

			#app {
				display: grid;
				place-items: center;
				min-height: 100vh;
				padding: 2rem;
			}

			.tetris-shell {
				display: grid;
				grid-template-columns: auto auto auto;
				grid-template-areas: "hold board queue";
				gap: 1.5rem;
				align-items: start;
				padding: 1.5rem;
				border-radius: 1rem;
				background: rgba(15, 23, 42, 0.6);
				backdrop-filter: blur(8px);
				box-shadow:
					0 0 0 1px rgba(148, 163, 184, 0.1),
					0 30px 60px -15px rgba(0, 0, 0, 0.5);
			}

			.tetris-hud {
				grid-area: hud;
				display: grid;
				grid-template-columns: repeat(4, minmax(0, 1fr));
				gap: 1rem;
				width: 100%;
				margin-bottom: 1rem;
				font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
			}

			.tetris-hud-stat {
				display: flex;
				flex-direction: column;
				gap: 0.125rem;
				padding: 0.5rem 0.75rem;
				border-radius: 0.375rem;
				background: rgba(30, 41, 59, 0.6);
				border: 1px solid rgba(148, 163, 184, 0.08);
			}
			.tetris-hud-stat-label {
				font-size: 0.625rem;
				opacity: 0.6;
				text-transform: uppercase;
				letter-spacing: 0.08em;
			}
			.tetris-hud-stat-value {
				font-size: 1.125rem;
				font-weight: 600;
				color: var(--fg);
			}

			[data-playfield="true"] {
				grid-area: board;
				border-radius: 0.5rem;
				padding: 4px !important;
				background: var(--frame) !important;
				box-shadow:
					inset 0 0 0 1px rgba(56, 189, 248, 0.15),
					0 0 24px rgba(56, 189, 248, 0.1);
			}

			[data-playfield="true"] > div {
				background: var(--bg-cell-empty);
				border-radius: 2px;
				transition: background 80ms ease-out;
			}

			[data-filled="true"] {
				box-shadow:
					inset 2px 2px 0 0 rgba(255, 255, 255, 0.25),
					inset -2px -2px 0 0 rgba(0, 0, 0, 0.35);
			}

			.piece-overlay {
				background: var(--piece-color, #888) !important;
				box-shadow:
					inset 2px 2px 0 0 rgba(255, 255, 255, 0.4),
					inset -2px -2px 0 0 rgba(0, 0, 0, 0.4),
					0 0 8px var(--piece-color, transparent);
			}

			[data-ghost="true"] {
				background: transparent !important;
				box-shadow: inset 0 0 0 2px var(--piece-color, var(--fg-dim));
				opacity: 0.55;
			}

			[data-clearing="true"] {
				animation: tetris-sweep 250ms ease-out forwards;
			}
			@keyframes tetris-sweep {
				0% {
					background: #fff;
					transform: scaleY(1);
					filter: brightness(2);
				}
				50% {
					background: #fef9c3;
					filter: brightness(1.6);
				}
				100% {
					background: #fff;
					transform: scaleY(0.05);
					filter: brightness(2.5);
				}
			}

			[data-lock-flash="true"] {
				animation: tetris-lock 200ms ease-out;
			}
			@keyframes tetris-lock {
				0% {
					filter: brightness(2.5);
					background: #fff;
				}
				100% {
					filter: brightness(1);
				}
			}

			.tetris-side {
				display: flex;
				flex-direction: column;
				gap: 1rem;
				font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
				color: var(--fg-dim);
			}
			.tetris-side[data-slot="hold"] {
				grid-area: hold;
			}
			.tetris-side[data-slot="queue"] {
				grid-area: queue;
			}
			.tetris-side h3 {
				margin: 0 0 0.25rem;
				font-size: 0.625rem;
				text-transform: uppercase;
				letter-spacing: 0.1em;
				color: var(--fg-dim);
				opacity: 0.7;
			}

			.tetris-mini {
				display: grid;
				grid-template-columns: repeat(4, var(--mini-cell-px));
				grid-template-rows: repeat(4, var(--mini-cell-px));
				gap: 1px;
				padding: 4px;
				background: var(--frame);
				border-radius: 4px;
			}
			.tetris-mini > div {
				background: var(--bg-cell-empty);
				border-radius: 1px;
			}
			.tetris-mini > div[data-mini-filled="true"] {
				background: var(--mini-color, var(--fg-dim));
				box-shadow: inset 1px 1px 0 0 rgba(255, 255, 255, 0.3);
			}

			.tetris-status-running {
				color: var(--accent);
			}
			.tetris-status-paused {
				color: #fbbf24;
			}
			.tetris-status-game-over {
				color: #f87171;
			}
		</style>
	</head>
	<body>
		<div id="app"></div>
		<script type="module" src="/src/main.ts"></script>
	</body>
</html>
